appId: host.exp.exponent
name: "EXPENSE-01: Add an expense from FAB"
---
- launchApp:
    clearState: true
- assertVisible: "Sign In"
- tapOn: "Use Demo Account"
- assertVisible: "Total balance"

# First create a group if none exists
- tapOn: "Groups"
- runFlow:
    when:
      visible: "No groups yet"
    flow: |
      - tapOn:
          id: "fab-add-group"
      - extendedWaitUntil:
          visible: "New Group"
          timeout: 5000
      - tapOn:
          id: "group-name-input"
      - inputText: "Test Group"
      - hideKeyboard
      - tapOn: "Create"
      - assertVisible: "Groups"

# Go back to Home and tap center FAB
- tapOn: "Home"
- assertVisible: "Total balance"
- tapOn:
    id: "center-add-btn"

# Group picker appears (no group pre-selected from Home tab)
- extendedWaitUntil:
    visible: "Select Group"
    timeout: 8000
- tapOn:
    id: "group-picker-item"
    index: 0

# Now on main AddExpense form
- assertVisible: "Add Expense"
- takeScreenshot: "expense_01_form"

# Fill description
- tapOn:
    id: "expense-description-input"
- inputText: "Maestro Dinner Test"
- hideKeyboard

# Fill amount
- tapOn:
    id: "expense-amount-input"
- inputText: "1200"
- hideKeyboard

- takeScreenshot: "expense_02_filled"

# Save
- tapOn: "Save"
- assertVisible: "Total balance"
- takeScreenshot: "expense_03_saved_home"

# Verify in activity
- tapOn: "Activity"
- assertVisible: "Maestro Dinner Test"
- takeScreenshot: "expense_04_in_activity"
