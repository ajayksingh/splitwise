appId: host.exp.exponent
name: "HELPER: Login with demo account"
---
# Dismiss Expo dev menu if showing
- tapOn:
    text: "Continue"
    optional: true
# Switch to Sign In tab if needed
- tapOn:
    text: "Sign In"
    optional: true
# Demo button auto-logs in — no need to tap Submit after
- tapOn: "Use Demo Account (alice@demo.com)"
- extendedWaitUntil:
    visible: "Total balance"
    timeout: 20000
