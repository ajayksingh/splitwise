<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Splitwise</title>
    <script>
      // GitHub Pages SPA redirect trick
      // When GitHub Pages serves 404, this page redirects to index.html
      // with the original path encoded as a query parameter
      var segmentCount = 1; // 1 = one path segment for the repo name (/splitwise)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
